name: LiDAR Companies
description: >
  The LiDAR industry evolved from Velodyne's pioneering spinning sensors for
  autonomous vehicles into a competitive landscape of solid-state, MEMS, and
  FMCW technologies. Velodyne dominated early AV development but merged with
  Ouster in 2023. Chinese players Hesai, RoboSense, and Livox emerged with
  cost-effective alternatives. Luminar, Innoviz, and Aeva pursued automotive
  OEM partnerships with next-generation architectures.
source_awesome_lists: []

methods:
  - name: "Velodyne HDL-64E"
    year: 2007
    tags: [velodyne, spinning-lidar, 64-channel, autonomous-driving]
    parents: []
    description: "First high-resolution 3D LiDAR for autonomous vehicles, used extensively in DARPA Urban Challenge"

  - name: "Velodyne VLP-16 Puck"
    year: 2014
    tags: [velodyne, spinning-lidar, 16-channel, cost-reduction]
    parents:
      - name: "Velodyne HDL-64E"
        relation: extends
    description: "Compact 16-channel LiDAR that democratized 3D sensing with a lower price point for robotics and mapping"

  - name: "RoboSense RS-LiDAR"
