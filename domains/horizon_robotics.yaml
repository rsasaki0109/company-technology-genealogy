name: Horizon Robotics
description: >
  Horizon Robotics was founded in 2015 by Yu Kai, former head of Baidu's Institute
  of Deep Learning. The company develops AI chips and full-stack ADAS/AD solutions
  for the automotive industry, primarily serving Chinese OEMs. Its Journey series of
  chips has been widely adopted by automakers including BYD, Volkswagen, and Li Auto.
  Horizon went public on the Hong Kong Stock Exchange in 2024.
source_awesome_lists: []

methods:
  - name: "Horizon Robotics Founded by Yu Kai"
    year: 2015
    tags: [founding, china, ai-chip, yu-kai]
    parents: []
    description: "Former Baidu IDL head Yu Kai founded Horizon Robotics in Beijing to develop edge AI processors for autonomous driving"

  - name: "Journey 2 Chip"
    year: 2019
    tags: [hardware, chip, journey-2, adas]
    parents:
      - name: "Horizon Robotics Founded by Yu Kai"
        relation: extends
    description: "Second-generation automotive AI chip delivering 4 TOPS, targeting L2 ADAS applications for mass-market vehicles"

  - name: "Journey 3 Chip"
    year: 2020
    tags: [hardware, chip, journey-3, adas]
    parents:
      - name: "Journey 2 Chip"
        relation: extends
    description: "Third-generation chip with improved performance for L2+ ADAS, adopted by multiple Chinese automakers"

  - name: "Journey 5 Chip"
