    parents:
      - name: "Constitutional AI Paper"
        relation: extends
    description: "Anthropic published its Responsible Scaling Policy framework with AI Safety Levels for evaluating model risk"

  - name: "Claude 3 (Opus / Sonnet / Haiku)"
