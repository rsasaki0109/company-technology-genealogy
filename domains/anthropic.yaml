name: Anthropic
description: >
  Anthropic was founded in 2021 by Dario Amodei, Daniela Amodei, and other
  former OpenAI researchers focused on AI safety. The company developed the
  Claude family of AI assistants using Constitutional AI and Reinforcement
  Learning from Human Feedback. Anthropic has raised significant funding from
  Amazon and Google, and established itself as a frontier AI lab with a strong
  emphasis on responsible scaling and interpretability research.
source_awesome_lists: []

methods:
  - name: "Anthropic Founded"
    year: 2021
    tags: [founding, ai-safety, research, ex-openai]
    parents: []
    description: "Dario Amodei, Daniela Amodei, and former OpenAI researchers founded Anthropic to build safe and reliable AI systems"

  - name: "Constitutional AI Paper"
    year: 2022
    tags: [research, alignment, safety, training-method]
    parents:
      - name: "Anthropic Founded"
        relation: extends
    description: "Published Constitutional AI method for training harmless AI assistants using a set of principles without human feedback labels"

  - name: "Claude 1"
    year: 2023
    tags: [language-model, assistant, safety, launch]
    parents:
      - name: "Constitutional AI Paper"
        relation: extends
    description: "First public release of Claude AI assistant with strong performance on helpfulness and reduced harmful outputs"

  - name: "Claude 2"
    year: 2023
    tags: [language-model, assistant, long-context, improved]
    parents:
      - name: "Claude 1"
        relation: extends
    description: "Major upgrade with 100K context window, improved coding, math, and reasoning over Claude 1"

  - name: "Amazon Partnership ($4B+ Investment)"
    year: 2023
    tags: [partnership, amazon, aws, investment]
    parents:
      - name: "Anthropic Founded"
        relation: extends
    description: "Amazon invested up to $4B in Anthropic, making AWS a primary cloud provider and integrating Claude into Amazon Bedrock"

  - name: "Google Cloud Partnership"
    year: 2023
    tags: [partnership, google, gcp, investment]
    parents:
      - name: "Anthropic Founded"
        relation: extends
